<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Stuff: The Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --cosmos: #0a0e27;
  --cosmos-card: #0f1535;
  --cream: #fdf6e3;
  --gold: #f4c430;
  --gold-dim: #c9a020;
  --nebula-pink: #d946a8;
  --nebula-cyan: #4ac1e0;
  --text-muted: #8899bb;
  --card-border: rgba(244,196,48,0.2);
  --card-bg: rgba(15,21,53,0.92);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== BODY & STARFIELD ===== */
body {
  background: var(--cosmos);
  color: var(--cream);
  font-family: 'Lora', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Starfield */
body::before, body::after {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
body::before {
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 42%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 38% 8%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 52% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 63% 55%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 71% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 82% 70%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 5% 80%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 18% 65%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 57% 88%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 76% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 93% 82%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 34% 22%, rgba(200,220,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 67% 48%, rgba(200,220,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 12% 95%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 12%, rgba(255,220,150,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 42% 58%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 79% 44%, rgba(255,255,255,0.6) 0%, transparent 100%);
  animation: twinkle1 4s ease-in-out infinite alternate;
}
body::after {
  background-image:
    radial-gradient(1px 1px at 15% 28%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 29% 72%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 44% 45%, rgba(200,220,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 58% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 60%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 35%, rgba(255,220,150,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 96% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 8% 48%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 37% 92%, rgba(200,220,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 62%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 78%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 78% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 68%, rgba(255,220,150,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 4% 38%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 5%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 83% 96%, rgba(200,220,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 31% 52%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 69% 38%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 47% 82%, rgba(255,255,255,0.8) 0%, transparent 100%);
  animation: twinkle2 6s ease-in-out infinite alternate;
}
@keyframes twinkle1 {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}
@keyframes twinkle2 {
  0% { opacity: 0.8; }
  33% { opacity: 0.3; }
  66% { opacity: 0.9; }
  100% { opacity: 0.5; }
}

/* ===== APP CONTAINER ===== */
#app {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ===== FADE TRANSITION ===== */
.scene {
  animation: fadeIn 400ms ease-in-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== HERO IMAGE ===== */
.hero-image-wrap {
  width: 100%;
  height: 42vh;
  min-height: 220px;
  max-height: 400px;
  position: relative;
  overflow: hidden;
}
.hero-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}
.hero-image-wrap::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(to bottom, transparent, var(--cosmos) 90%);
}

/* ===== SCENE CARD ===== */
.scene-card {
  margin: 0 16px 24px;
  padding: 28px 32px 36px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  backdrop-filter: blur(8px);
}

/* ===== SCENE TITLE ===== */
.scene-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  margin-bottom: 24px;
  text-shadow: 0 0 30px rgba(244,196,48,0.4);
  line-height: 1.2;
}

/* ===== STORY TEXT ===== */
.story-text {
  font-size: clamp(1rem, 2.2vw, 1.15rem);
  line-height: 1.8;
  color: var(--cream);
  margin-bottom: 16px;
}
.story-text strong {
  color: var(--gold);
}

/* ===== CHOICES ===== */
.choices {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.choice-btn {
  background: transparent;
  border: 2px solid var(--gold-dim);
  color: var(--cream);
  font-family: 'Lora', Georgia, serif;
  font-size: clamp(0.95rem, 2vw, 1.05rem);
  padding: 16px 24px;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  transition: all 250ms ease;
  position: relative;
  overflow: hidden;
}
.choice-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(244,196,48,0.08), transparent);
  opacity: 0;
  transition: opacity 250ms ease;
}
.choice-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 20px rgba(244,196,48,0.25), inset 0 0 20px rgba(244,196,48,0.05);
  transform: translateX(4px);
}
.choice-btn:hover::before { opacity: 1; }
.choice-btn:active { transform: translateX(2px) scale(0.99); }
.choice-letter {
  display: inline-block;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--gold-dim);
  color: var(--cosmos);
  font-weight: 700;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  text-align: center;
  line-height: 28px;
  margin-right: 12px;
  flex-shrink: 0;
  transition: background 250ms ease;
  vertical-align: middle;
}
.choice-btn:hover .choice-letter {
  background: var(--gold);
}

/* ===== CONCEPT FOOTER ===== */
.concept-tag {
  margin-top: 28px;
  padding: 10px 16px;
  background: rgba(74,193,224,0.08);
  border-left: 3px solid var(--nebula-cyan);
  border-radius: 0 6px 6px 0;
  font-size: 0.85rem;
  color: var(--nebula-cyan);
  font-style: italic;
}

/* ===== COUNTER ===== */
.counter-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px 0;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.counter-bar .badge-count {
  color: var(--gold);
}
.badge-wall-link {
  background: none;
  border: 1px solid var(--text-muted);
  color: var(--text-muted);
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 200ms ease;
}
.badge-wall-link:hover {
  border-color: var(--gold);
  color: var(--gold);
}

/* ===== ENDING SCREEN ===== */
.ending-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 28px;
}
.btn-primary {
  background: var(--gold);
  color: var(--cosmos);
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1rem;
  padding: 16px 32px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 200ms ease;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.btn-primary:hover {
  background: #ffe066;
  box-shadow: 0 0 24px rgba(244,196,48,0.5);
  transform: translateY(-2px);
}
.btn-secondary {
  background: transparent;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  padding: 12px 24px;
  border: 2px solid var(--gold-dim);
  border-radius: 8px;
  cursor: pointer;
  transition: all 200ms ease;
}
.btn-secondary:hover {
  border-color: var(--gold);
  box-shadow: 0 0 16px rgba(244,196,48,0.2);
}

.ending-badge-unlocked {
  text-align: center;
  font-size: 2.5rem;
  margin-bottom: 8px;
  animation: popIn 500ms cubic-bezier(0.34,1.56,0.64,1) both;
}
.ending-badge-unlocked.already-had {
  animation: none;
  opacity: 0.6;
  font-size: 1.8rem;
}
@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.badge-new-label {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}

/* ===== SUPERNOVA SHAKE ===== */
@keyframes shake {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  10% { transform: translate(-6px,3px) rotate(-1deg); }
  20% { transform: translate(8px,-4px) rotate(1.5deg); }
  30% { transform: translate(-5px,6px) rotate(-0.5deg); }
  40% { transform: translate(7px,-3px) rotate(1deg); }
  50% { transform: translate(-8px,2px) rotate(-1.5deg); }
  60% { transform: translate(5px,5px) rotate(0.5deg); }
  70% { transform: translate(-7px,-2px) rotate(-1deg); }
  80% { transform: translate(6px,4px) rotate(1deg); }
  90% { transform: translate(-4px,-5px) rotate(-0.5deg); }
}
.shake { animation: shake 600ms ease-in-out; }

/* ===== BADGE WALL ===== */
.badge-wall-page {
  padding: 24px 16px;
}
.badge-wall-header {
  font-family: 'Cinzel', serif;
  text-align: center;
  margin-bottom: 8px;
}
.badge-wall-header h1 {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(244,196,48,0.4);
}
.badge-wall-header .progress {
  font-size: 1rem;
  color: var(--text-muted);
  margin: 8px 0 24px;
}
.badge-wall-header .progress span {
  color: var(--gold);
  font-weight: 700;
}
.badge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.badge-card {
  border: 1px solid var(--card-border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--card-bg);
  transition: transform 200ms ease, box-shadow 200ms ease;
}
.badge-card.unlocked:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(244,196,48,0.2);
}
.badge-card .badge-img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  display: block;
}
.badge-card.locked .badge-img {
  filter: grayscale(100%) brightness(0.3);
}
.badge-card .badge-info {
  padding: 12px;
}
.badge-card .badge-title {
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  color: var(--gold);
  font-weight: 600;
}
.badge-card.locked .badge-title {
  color: var(--text-muted);
}
.badge-wall-actions {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding-bottom: 40px;
}
.btn-danger {
  background: none;
  color: #ff6b6b;
  border: 1px solid rgba(255,107,107,0.4);
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 200ms ease;
}
.btn-danger:hover {
  background: rgba(255,107,107,0.1);
  border-color: #ff6b6b;
}

/* ===== START SCREEN ===== */
.start-screen {
  text-align: center;
  padding: 40px 24px 60px;
}
.start-screen .big-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 7vw, 4rem);
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(244,196,48,0.5), 0 0 80px rgba(244,196,48,0.2);
  margin-bottom: 8px;
  line-height: 1.1;
}
.start-screen .subtitle {
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: var(--nebula-cyan);
  font-style: italic;
  margin-bottom: 40px;
}
.start-hero {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 32px;
  border: 1px solid var(--card-border);
}
.start-intro {
  max-width: 600px;
  margin: 0 auto 36px;
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--cream);
  background: var(--card-bg);
  padding: 24px 28px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  text-align: left;
}
.start-buttons {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  max-width: 360px;
  margin: 0 auto;
}

/* ===== QUIZ GATE ===== */
.quiz-gate { margin-top: 28px; padding: 20px; background: rgba(74,193,224,0.05); border: 1px solid rgba(74,193,224,0.25); border-radius: 10px; }
.quiz-prompt { font-family: 'Cinzel', serif; font-size: 0.9rem; color: var(--nebula-cyan); margin-bottom: 4px; letter-spacing: 0.05em; }
.quiz-question { font-size: 1rem; color: var(--cream); font-weight: 600; margin-bottom: 14px; line-height: 1.5; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  background: transparent; border: 1.5px solid rgba(255,255,255,0.15); color: var(--cream);
  font-family: 'Lora', serif; font-size: 0.9rem; padding: 10px 16px; border-radius: 6px;
  cursor: pointer; text-align: left; transition: all 150ms ease;
}
.quiz-opt:hover { border-color: var(--nebula-cyan); color: var(--nebula-cyan); }
.quiz-opt.correct { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.1); pointer-events: none; }
.quiz-opt.wrong { border-color: #f87171; color: #f87171; background: rgba(248,113,113,0.08); pointer-events: none; }
.quiz-opt.disabled { pointer-events: none; opacity: 0.4; }
.quiz-feedback { margin-top: 12px; font-size: 0.85rem; padding: 10px 14px; border-radius: 6px; line-height: 1.5; }
.quiz-feedback.correct { background: rgba(74,222,128,0.1); color: #4ade80; }
.quiz-feedback.wrong { background: rgba(248,113,113,0.08); color: #f87171; }
.choices-locked { margin-top: 24px; text-align: center; font-size: 0.82rem; color: var(--text-muted); font-style: italic; padding: 10px; border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px; }

/* ===== GRAVITY / FUSION DIAGRAM ===== */
.gf-diagram { margin-top: 24px; background: rgba(5,8,20,0.7); border: 1px solid rgba(244,196,48,0.15); border-radius: 12px; padding: 18px 12px 14px; text-align: center; }
.gf-eyebrow { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
.gf-label { font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 700; margin-top: 10px; letter-spacing: 0.06em; }
.gf-label.balanced { color: var(--gold); }
.gf-label.intense { color: var(--nebula-cyan); }
.gf-label.tipping { color: var(--nebula-pink); }
.gf-label.won { color: #f87171; }

/* ===== SIZE COMPARISON ===== */
.size-compare { margin-top: 20px; background: rgba(5,8,20,0.6); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 16px 12px; }
.size-compare-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); text-align: center; margin-bottom: 14px; }
.size-compare-row { display: flex; align-items: flex-end; justify-content: center; gap: 28px; margin-bottom: 10px; }
.size-star { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.size-circle { border-radius: 50%; flex-shrink: 0; }
.size-name { font-family: 'Cinzel', serif; font-size: 0.62rem; text-align: center; letter-spacing: 0.04em; max-width: 70px; line-height: 1.3; }
.size-mass { font-size: 0.6rem; color: var(--text-muted); text-align: center; }

/* ===== HYDROGEN FUEL GAUGE ===== */
.fuel-gauge { display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(5,8,20,0.5);border:1px solid rgba(255,255,255,0.07);border-radius:8px;margin-bottom:16px; }
.fuel-icon { font-size:1.1rem; flex-shrink:0; }
.fuel-label { font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap; }
.fuel-bar-wrap { flex:1;height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden; }
.fuel-bar-fill { height:100%;border-radius:5px;transition:width 0.4s ease; }
.fuel-pct { font-family:'Cinzel',serif;font-size:0.72rem;font-weight:700;white-space:nowrap;min-width:36px;text-align:right; }

/* ===== ELEMENT FUSION LADDER ===== */
.element-ladder { margin-top: 20px; }
.element-ladder-title { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
.element-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; margin-bottom: 5px; font-size: 0.82rem; }
.element-row.done { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); color: #4ade80; }
.element-row.danger { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.35); color: #f87171; font-weight: 700; }
.element-symbol { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; width: 34px; text-align: center; }
.element-desc { flex: 1; }
.element-time { font-size: 0.7rem; color: inherit; opacity: 0.7; text-align: right; white-space: nowrap; }

/* ===== REAL PHOTO STRIP ===== */
.real-strip {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  border-top: 1px solid rgba(255,255,255,0.08);
  margin-top: 24px;
  padding-top: 20px;
}
.real-strip-img {
  width: 150px;
  height: 95px;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.12);
}
.real-strip-body { flex: 1; min-width: 0; }
.real-strip-eyebrow {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--nebula-cyan);
  margin-bottom: 5px;
}
.real-strip-caption {

const STORAGE_KEY = 'starAdventure_badges';

function getBadges() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function addBadge(id) {
  const badges = getBadges();
  if (!badges.includes(id)) {
    badges.push(id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(badges));
    return true; // newly unlocked
  }
  return false;
}

function clearBadges() {
  localStorage.removeItem(STORAGE_KEY);
}

function renderTimeline(card, endingId) {
  const tl = TIMELINES[endingId];
  if (!tl) return;
  const wrap = document.createElement('div');
  wrap.style.cssText = 'margin-top:24px;padding:18px 16px;background:rgba(5,8,20,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:10px;';
  const eyebrow = document.createElement('div');
  eyebrow.style.cssText = 'font-family:Cinzel,serif;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;';
  eyebrow.textContent = '⏱ Your Star\'s Life Timeline';
  wrap.appendChild(eyebrow);

  const totalLine = document.createElement('div');
  totalLine.style.cssText = `font-family:Cinzel,serif;font-size:0.9rem;font-weight:700;color:${tl.color};margin-bottom:14px;`;
  totalLine.textContent = `Total lifespan: ${tl.total}`;
  wrap.appendChild(totalLine);

  tl.steps.forEach((step, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:6px;';
    const dot = document.createElement('div');
    dot.style.cssText = `width:10px;height:10px;border-radius:50%;background:${tl.color};flex-shrink:0;opacity:${0.4 + (i / tl.steps.length) * 0.6};`;
    const line = i < tl.steps.length - 1 ? `<div style="width:2px;height:18px;background:${tl.color};opacity:0.25;margin-left:4px;margin-bottom:2px;"></div>` : '';
    const stepWrap = document.createElement('div');
    stepWrap.style.cssText = 'flex:1;';
    stepWrap.innerHTML = `<span style="font-size:0.82rem;color:var(--cream);">${step.label}</span><br><span style="font-size:0.72rem;color:var(--text-muted);">${step.dur}</span>`;
    row.appendChild(dot);
    row.appendChild(stepWrap);
    wrap.appendChild(row);
  });

  if (tl.note) {
    const note = document.createElement('p');
    note.style.cssText = 'font-size:0.75rem;color:var(--text-muted);font-style:italic;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);line-height:1.5;';
    note.textContent = tl.note;
    wrap.appendChild(note);
  }
  card.appendChild(wrap);
}

  const rows = [
    { symbol: 'H', name: 'Hydrogen → Helium', time: 'Millions of years', done: true },
    { symbol: 'He', name: 'Helium → Carbon', time: 'Thousands of years', done: true },
    { symbol: 'C', name: 'Carbon → Oxygen', time: 'Hundreds of years', done: true },
    { symbol: 'O', name: 'Oxygen → Silicon', time: 'Months', done: true },
    { symbol: 'Si', name: 'Silicon → Iron', time: 'One day', done: true },
    { symbol: 'Fe', name: 'IRON — cannot fuse! Gravity WINS.', time: '< 1 second', done: false },
  ];

  rows.forEach(r => {
    const row = document.createElement('div');
    row.className = `element-row ${r.done ? 'done' : 'danger'}`;
    row.innerHTML = `<span class="element-symbol">${r.symbol}</span><span class="element-desc">${r.done ? '✓ ' : '✗ '}${r.name}</span><span class="element-time">${r.time}</span>`;
    wrap.appendChild(row);
  });

  const note = document.createElement('p');
  note.style.cssText = 'font-size:0.75rem;color:var(--text-muted);margin-top:10px;font-style:italic;padding:0 4px;line-height:1.5;';
  note.innerHTML = 'Each stage releases <em>less</em> energy and burns out <em>faster</em>. Iron is the end of the road — fusing iron <strong>absorbs</strong> energy instead of releasing it. The moment your core goes iron, fusion stops and gravity collapses you in under a second.';
  wrap.appendChild(note);
  card.appendChild(wrap);
}

// ===== QUIZ GATE RENDERER =====
function renderQuizGate(card, nodeId, onPass) {
  const quiz = QUIZZES[nodeId];
  if (!quiz) { onPass(); return; }
  if (window._quizPassed[nodeId]) { onPass(); return; }

  // Locked choices placeholder
  const locked = document.createElement('div');
  locked.className = 'choices-locked';
  locked.textContent = '🔒 Answer the question below to unlock your choices';
  card.appendChild(locked);

  const gate = document.createElement('div');
  gate.className = 'quiz-gate';
  const prompt = document.createElement('div');
  prompt.className = 'quiz-prompt';
  prompt.textContent = '❓ Quick check — read carefully before you choose:';
  gate.appendChild(prompt);
  const q = document.createElement('div');
  q.className = 'quiz-question';
  q.textContent = quiz.q;
  gate.appendChild(q);

  const opts = document.createElement('div');
  opts.className = 'quiz-options';

  quiz.options.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = text;
    btn.addEventListener('click', () => {
      // Disable all options
      opts.querySelectorAll('.quiz-opt').forEach(b => b.classList.add('disabled'));
      const feedback = document.createElement('div');
      if (i === quiz.correct) {
        btn.classList.add('correct');
        feedback.className = 'quiz-feedback correct';
        feedback.textContent = '✓ Correct! Choices unlocked.';
        gate.appendChild(feedback);
        window._quizPassed[nodeId] = true;
        setTimeout(() => {
          locked.remove();
          gate.remove();
          onPass();
        }, 900);
      } else {
        btn.classList.add('wrong');
        feedback.className = 'quiz-feedback wrong';
        feedback.innerHTML = `✗ Not quite. <em>Hint: ${quiz.hint}</em> — re-read and try again!`;
        gate.appendChild(feedback);
        setTimeout(() => {
          opts.querySelectorAll('.quiz-opt').forEach(b => { b.classList.remove('disabled','wrong','correct'); });
          feedback.remove();
        }, 2200);
      }
    });
    opts.appendChild(btn);
  });

  gate.appendChild(opts);
  card.appendChild(gate);
}

// ===== REAL PHOTO STRIP RENDERER =====
function renderRealStrip(card, id) {
  const data = REAL_PHOTOS[id];
  if (!data) return;
  const strip = document.createElement('div');
  strip.className = 'real-strip';
  const img = document.createElement('img');
  img.src = data.image;
  img.alt = data.wikiLabel;
  img.className = 'real-strip-img';
  img.loading = 'lazy';
  img.onerror = function() { this.style.display = 'none'; };
  strip.appendChild(img);
  const body = document.createElement('div');
  body.className = 'real-strip-body';
  const eyebrow = document.createElement('div');
  eyebrow.className = 'real-strip-eyebrow';
  eyebrow.textContent = '📷 Real Photo';
  body.appendChild(eyebrow);
  const caption = document.createElement('p');
  caption.className = 'real-strip-caption';
  caption.textContent = data.caption;
  body.appendChild(caption);
  const link = document.createElement('a');
  link.className = 'real-strip-link';
  link.href = data.wiki;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  link.innerHTML = `→ Wikipedia: ${data.wikiLabel}`;
  body.appendChild(link);
  strip.appendChild(body);
  card.appendChild(strip);
}

// ===== RENDER ENGINE =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (currentView === 'start') {
    renderStart(app);
  } else if (currentView === 'node') {
    renderNode(app, currentNodeId);
  } else if (currentView === 'ending') {
    renderEnding(app, currentNodeId);
  } else if (currentView === 'badges') {
    renderBadgeWall(app);
  }
}

function badgeCountHTML() {
  const count = getBadges().length;
  const total = Object.keys(ENDINGS).length;
  return `<span class="badge-count">${count}</span> / ${total} Endings Found`;
}

function renderCounterBar(container) {
  const bar = document.createElement('div');
  bar.className = 'counter-bar';
  bar.innerHTML = `<span>${badgeCountHTML()}</span>`;
  const wallBtn = document.createElement('button');
  wallBtn.className = 'badge-wall-link';
  wallBtn.textContent = '🏆 Badge Wall';
  wallBtn.addEventListener('click', () => { currentView = 'badges'; render(); });
  bar.appendChild(wallBtn);
  container.appendChild(bar);
}

function renderStart(container) {
  const div = document.createElement('div');
  div.className = 'scene start-screen';

  const img = document.createElement('img');
  img.src = IMG.pillars;
  img.alt = 'Pillars of Creation nebula';
  img.className = 'start-hero';
  img.loading = 'lazy';
  div.appendChild(img);

  const title = document.createElement('h1');
  title.className = 'big-title';
  title.textContent = 'Star Stuff';
  div.appendChild(title);

  const sub = document.createElement('p');
  sub.className = 'subtitle';
  sub.textContent = 'The Adventure';
  div.appendChild(sub);

  const intro = document.createElement('div');
  intro.className = 'start-intro';
  intro.innerHTML = `
    <p>You are a tiny wisp of hydrogen gas. You are about to become a star.</p>
    <br>
    <p>Every star is a tug-of-war between <strong>gravity pulling inward</strong> and <strong>fusion pushing outward</strong>. The choices you make will decide your fate — will you live quietly for billions of years, or blaze bright and explode in a supernova?</p>
    <br>
    <p style="color:var(--gold); font-style:italic;">There are 20 different endings to discover. How many can you find?</p>
  `;
  div.appendChild(intro);

  const buttons = document.createElement('div');
  buttons.className = 'start-buttons';

  const startBtn = document.createElement('button');
  startBtn.className = 'btn-primary';
  startBtn.textContent = '🚀 Begin the Adventure';
  startBtn.style.width = '100%';
  startBtn.addEventListener('click', () => {
    currentNodeId = 'START_NEBULA';
    currentView = 'node';
    render();
  });
  buttons.appendChild(startBtn);

  const wallBtn = document.createElement('button');
  wallBtn.className = 'btn-secondary';
  wallBtn.style.width = '100%';
  wallBtn.innerHTML = `🏆 Badge Wall (${getBadges().length} / ${Object.keys(ENDINGS).length})`;
  wallBtn.addEventListener('click', () => { currentView = 'badges'; render(); });
  buttons.appendChild(wallBtn);

  div.appendChild(buttons);
  container.appendChild(div);
}

function buildChoices(card, node) {
  const choicesDiv = document.createElement('div');
  choicesDiv.className = 'choices';
  const letters = ['A', 'B', 'C', 'D'];
  node.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span>${choice.label}`;
    btn.addEventListener('click', () => {
      const dest = choice.next;
      if (NODES[dest]) {
        currentNodeId = dest;
        currentView = 'node';
        if (dest === 'SUPERNOVA') {
          render();
          setTimeout(() => {
            const el = document.getElementById('supernova-card');
            if (el) el.classList.add('shake');
          }, 50);
        } else {
          render();
        }
      } else if (ENDINGS[dest]) {
        const wasNew = addBadge(dest);
        currentNodeId = dest;
        currentView = 'ending';
        window._justUnlocked = wasNew;
        render();
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    choicesDiv.appendChild(btn);
  });
  card.appendChild(choicesDiv);
}

function renderNode(container, nodeId) {
  const node = NODES[nodeId];
  if (!node) { currentNodeId = 'START_NEBULA'; render(); return; }

  renderCounterBar(container);

  const scene = document.createElement('div');
  scene.className = 'scene';

  // Mass path banner (shown on all nodes after the opening choice)
  if (nodeId !== 'START_NEBULA') renderMassBanner(scene, nodeId);

  // Hero image
  const heroWrap = document.createElement('div');
  heroWrap.className = 'hero-image-wrap';
  const heroImg = document.createElement('img');
  heroImg.src = node.image;
  heroImg.alt = node.title;
  heroImg.loading = 'lazy';
  heroImg.onerror = function() { this.src = IMG.pillars; };
  heroWrap.appendChild(heroImg);
  scene.appendChild(heroWrap);

  // Card
  const card = document.createElement('div');
  card.className = 'scene-card';
  if (node.isSupernova) card.id = 'supernova-card';

  const titleEl = document.createElement('h2');
  titleEl.className = 'scene-title';
  titleEl.textContent = node.title;
  card.appendChild(titleEl);

  // Hydrogen fuel gauge
  renderFuelGauge(card, nodeId);

  node.text.forEach(para => {
    const p = document.createElement('p');
    p.className = 'story-text';
    p.innerHTML = para;
    card.appendChild(p);
  });

  // Special inserts after text, before choices
  if (nodeId === 'START_NEBULA') renderSizeComparison(card);
  if (nodeId === 'SUPERGIANT_AGE') renderElementLadder(card);
  renderGravityDiagram(card, nodeId);

  // Comprehension quiz gate — choices only appear after correct answer
  renderQuizGate(card, nodeId, () => buildChoices(card, node));

  // Concept tag
  if (node.concept) {
    const ct = document.createElement('div');
    ct.className = 'concept-tag';
    ct.innerHTML = `🔬 <strong>Concept:</strong> ${node.concept}`;
    card.appendChild(ct);
  }

  // Real photo strip
  renderRealStrip(card, nodeId);

  scene.appendChild(card);
  container.appendChild(scene);
}

function renderEnding(container, endingId) {
  const ending = ENDINGS[endingId];
  if (!ending) { currentView = 'start'; render(); return; }

  renderCounterBar(container);

  const scene = document.createElement('div');
  scene.className = 'scene';

  // Hero image
  const heroWrap = document.createElement('div');
  heroWrap.className = 'hero-image-wrap';
  const heroImg = document.createElement('img');
  heroImg.src = ending.image;
  heroImg.alt = ending.title;
  heroImg.loading = 'lazy';
  heroImg.onerror = function() { this.src = IMG.pillars; };
  heroWrap.appendChild(heroImg);
  scene.appendChild(heroWrap);

  const card = document.createElement('div');
  card.className = 'scene-card';

  // Badge animation
  const badgeDiv = document.createElement('div');
  badgeDiv.className = window._justUnlocked ? 'ending-badge-unlocked' : 'ending-badge-unlocked already-had';
  badgeDiv.textContent = ending.emoji;
  card.appendChild(badgeDiv);

  if (window._justUnlocked) {
    const newLabel = document.createElement('div');
    newLabel.className = 'badge-new-label';
    newLabel.textContent = '✦ ENDING UNLOCKED ✦';
    card.appendChild(newLabel);
  }

  const titleEl = document.createElement('h2');
  titleEl.className = 'scene-title';
  titleEl.textContent = ending.title;
  card.appendChild(titleEl);

  const p = document.createElement('p');
  p.className = 'story-text';
  p.innerHTML = ending.text;
  card.appendChild(p);

  if (ending.concept) {
    const ct = document.createElement('div');
    ct.className = 'concept-tag';
    ct.innerHTML = `🔬 <strong>Concept:</strong> ${ending.concept}`;
    card.appendChild(ct);
  }

  // Timeline
  renderTimeline(card, endingId);

  // Real photo strip
  renderRealStrip(card, endingId);

  const actions = document.createElement('div');
  actions.className = 'ending-actions';

  const restartBtn = document.createElement('button');
  restartBtn.className = 'btn-primary';
  restartBtn.textContent = '🚀 Restart Adventure';
  restartBtn.addEventListener('click', () => {
    currentNodeId = 'START_NEBULA';
    currentView = 'node';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  actions.appendChild(restartBtn);

  const wallBtn = document.createElement('button');
  wallBtn.className = 'btn-secondary';
  wallBtn.innerHTML = `🏆 View Badges (${getBadges().length} / ${Object.keys(ENDINGS).length})`;
  wallBtn.addEventListener('click', () => { currentView = 'badges'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
  actions.appendChild(wallBtn);

  card.appendChild(actions);
  scene.appendChild(card);
  container.appendChild(scene);
}

function renderBadgeWall(container) {
  const badges = getBadges();
  const total = Object.keys(ENDINGS).length;
  const allEndingIds = Object.keys(ENDINGS);

  const page = document.createElement('div');
  page.className = 'scene badge-wall-page';

  const header = document.createElement('div');
  header.className = 'badge-wall-header';
  header.innerHTML = `
    <h1>Badge Wall</h1>
    <p class="progress"><span>${badges.length}</span> / ${total} Endings Found</p>
  `;
  page.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'badge-grid';

  allEndingIds.forEach(id => {
    const ending = ENDINGS[id];
    const unlocked = badges.includes(id);
    const card = document.createElement('div');
    card.className = `badge-card ${unlocked ? 'unlocked' : 'locked'}`;

    const img = document.createElement('img');
    img.src = ending.image;
    img.alt = unlocked ? ending.title : '???';
    img.className = 'badge-img';
    img.loading = 'lazy';
    img.onerror = function() { this.src = IMG.pillars; };
    card.appendChild(img);

    const info = document.createElement('div');
    info.className = 'badge-info';
    const titleEl = document.createElement('div');
    titleEl.className = 'badge-title';
    titleEl.textContent = unlocked ? `${ending.emoji} ${ending.title}` : '???';
    info.appendChild(titleEl);
    card.appendChild(info);

    if (unlocked) {
      card.addEventListener('click', () => {
        window._justUnlocked = false;
        currentNodeId = id;
        currentView = 'ending';
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      card.style.cursor = 'pointer';
    }

    grid.appendChild(card);
  });

  page.appendChild(grid);

  const wallActions = document.createElement('div');
  wallActions.className = 'badge-wall-actions';

  const adventureBtn = document.createElement('button');
  adventureBtn.className = 'btn-primary';
  adventureBtn.textContent = '🚀 Restart Adventure';
  adventureBtn.addEventListener('click', () => {
    currentNodeId = 'START_NEBULA';
    currentView = 'node';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  wallActions.appendChild(adventureBtn);

  const homeBtn = document.createElement('button');
  homeBtn.className = 'btn-secondary';
  homeBtn.textContent = '🏠 Home Screen';
  homeBtn.addEventListener('click', () => { currentView = 'start'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
  wallActions.appendChild(homeBtn);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'btn-danger';
  clearBtn.textContent = 'Clear all badges';
  clearBtn.addEventListener('click', () => {
    if (confirm('Clear all your badges and start fresh? This cannot be undone.')) {
      clearBadges();
      render();
    }
  });
  wallActions.appendChild(clearBtn);

  page.appendChild(wallActions);
  container.appendChild(page);
}

// ===== INITIAL RENDER =====
preloadAllImages();
render();
</script>
